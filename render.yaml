# Render Blueprint — https://render.com/docs/blueprint-spec
# Web service uses the repo Dockerfile (gunicorn on $PORT, migrate + collectstatic in CMD).
# Link the Postgres database so DATABASE_URL is set (never use localhost in DATABASE_URL).

databases:
  - name: customer-prediction-db
    databaseName: customer_prediction
    user: customer_prediction

services:
  - type: web
    name: customer-prediction-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: customer-prediction-db
          property: connectionString
