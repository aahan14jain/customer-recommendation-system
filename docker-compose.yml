# Full stack: PostgreSQL + Django + Next.js (build args match published host ports)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: customer_prediction
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d customer_prediction"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: customer_prediction
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./customer-recommendation-frontend
      dockerfile: Dockerfile
      args:
        # Browser calls the API on the host; backend is published at localhost:8001
        NEXT_PUBLIC_API_URL: http://localhost:8001
    ports:
      - "3003:3001"
    depends_on:
      - backend

volumes:
  postgres_data:
